<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HABITS — Focus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #181818;
    --border: #262626;
    --text-primary: #f0f0f0;
    --text-secondary: #555;
    --text-muted: #2e2e2e;
    --accent: #f0f0f0;
    --accent-dim: #2a2a2a;
    --work-color: #e8e8e8;
    --break-color: #7eb8a4;
    --long-color: #7e9eb8;
    --ring-track: #1e1e1e;
  }

  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --surface: #f0f0f0;
      --border: #e0e0e0;
      --text-primary: #111;
      --text-secondary: #999;
      --text-muted: #ccc;
      --accent: #111;
      --accent-dim: #e8e8e8;
      --work-color: #111;
      --break-color: #2d7a63;
      --long-color: #2d5a7a;
      --ring-track: #e8e8e8;
    }
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 2.5rem;
    background: var(--surface);
    border-radius: 100px;
    padding: 4px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 11px;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    font-weight: 400;
    color: var(--text-secondary);
    cursor: pointer;
    border: none;
    background: transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    color: var(--bg);
  }

  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 2rem;
  }

  .ring-svg {
    transform: rotate(-90deg);
    display: block;
  }

  .ring-track {
    fill: none;
    stroke: var(--ring-track);
    stroke-width: 3;
  }

  .ring-fill {
    fill: none;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-dasharray: 0 628;
    transition: stroke-dasharray 1s linear, stroke 0.4s;
  }

  .center-info {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }

  .time-display {
    font-family: 'DM Mono', monospace;
    font-size: 3rem;
    font-weight: 300;
    color: var(--text-primary);
    letter-spacing: -0.04em;
    line-height: 1;
  }

  .mode-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 8px;
    font-family: 'DM Mono', monospace;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 2rem;
  }

  .btn-main {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-primary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-main:hover {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-main.running {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-small {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: 'DM Mono', monospace;
  }

  .btn-small:hover {
    color: var(--text-primary);
    border-color: var(--text-secondary);
  }

  .sessions-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 1.8rem;
  }

  .session-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }

  .session-dot.done {
    background: var(--work-color);
  }

  .session-dot.long {
    background: var(--long-color);
  }

  .divider {
    width: 1px;
    height: 10px;
    background: var(--border);
    margin: 0 2px;
  }

  .stats-row {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
  }

  .stat {
    flex: 1;
    text-align: center;
    padding: 12px 8px;
    border-right: 1px solid var(--border);
  }

  .stat:last-child { border-right: none; }

  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-lbl {
    font-size: 9px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-top: 4px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="mode-tabs">
    <button class="tab active" onclick="setMode('work')">Focus</button>
    <button class="tab" onclick="setMode('short')">Short Break</button>
    <button class="tab" onclick="setMode('long')">Long Break</button>
  </div>

  <div class="ring-wrap">
    <svg class="ring-svg" width="220" height="220" viewBox="0 0 220 220">
      <circle class="ring-track" cx="110" cy="110" r="100"/>
      <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="100"/>
    </svg>
    <div class="center-info">
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="mode-label" id="modeLabel">Focus</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn-small" onclick="skipBack()" title="Restart">↺</button>
    <button class="btn-main" id="playBtn" onclick="toggleTimer()">▶</button>
    <button class="btn-small" onclick="skipForward()" title="Skip">↷</button>
  </div>

  <div class="sessions-row" id="sessionsRow"></div>

  <div class="stats-row">
    <div class="stat">
      <div class="stat-num" id="focusCount">0</div>
      <div class="stat-lbl">Sessions</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="focusMins">0m</div>
      <div class="stat-lbl">Focused</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="breakMins">0m</div>
      <div class="stat-lbl">Rested</div>
    </div>
  </div>

</div>

<script>
  const MODES = {
    work:  { label: 'Focus',       mins: 25, color: getComputedStyle(document.documentElement).getPropertyValue('--work-color').trim() },
    short: { label: 'Short Break', mins: 5,  color: '#7eb8a4' },
    long:  { label: 'Long Break',  mins: 15, color: '#7e9eb8' },
  };

  const C = 2 * Math.PI * 100;

  let mode       = 'work';
  let totalSecs  = 25 * 60;
  let remaining  = totalSecs;
  let running    = false;
  let interval   = null;
  let sessions   = 0;
  let focusMins  = 0;
  let breakMins  = 0;

  const ringEl    = document.getElementById('ringFill');
  const timeEl    = document.getElementById('timeDisplay');
  const labelEl   = document.getElementById('modeLabel');
  const playBtn   = document.getElementById('playBtn');
  const sessRow   = document.getElementById('sessionsRow');
  const focusC    = document.getElementById('focusCount');
  const focusM    = document.getElementById('focusMins');
  const breakM    = document.getElementById('breakMins');

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function updateRing() {
    const pct = remaining / totalSecs;
    ringEl.setAttribute('stroke-dasharray', `${pct * C} ${C}`);
    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    ringEl.style.stroke = mode === 'work'
      ? (isDark ? '#e8e8e8' : '#111')
      : mode === 'short' ? '#7eb8a4' : '#7e9eb8';
  }

  function updateDisplay() {
    timeEl.textContent = fmt(remaining);
    labelEl.textContent = MODES[mode].label;
    updateRing();
  }

  function setMode(m, autoStart) {
    clearInterval(interval);
    running = false;
    playBtn.textContent = '▶';
    playBtn.classList.remove('running');
    mode = m;
    totalSecs = MODES[m].mins * 60;
    remaining = totalSecs;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', ['work','short','long'][i] === m);
    });
    updateDisplay();
    if (autoStart) { running = true; playBtn.textContent = '⏸'; playBtn.classList.add('running'); startTick(); }
  }

  function startTick() {
    interval = setInterval(() => {
      if (remaining <= 0) {
        clearInterval(interval);
        running = false;
        if (mode === 'work') {
          sessions++;
          focusMins += MODES.work.mins;
          focusC.textContent = sessions;
          focusM.textContent = focusMins + 'm';
          buildDots();
          setMode(sessions % 4 === 0 ? 'long' : 'short', true);
        } else {
          breakMins += MODES[mode].mins;
          breakM.textContent = breakMins + 'm';
          setMode('work', false);
        }
        return;
      }
      remaining--;
      updateDisplay();
    }, 1000);
  }

  function toggleTimer() {
    if (running) {
      clearInterval(interval);
      running = false;
      playBtn.textContent = '▶';
      playBtn.classList.remove('running');
    } else {
      running = true;
      playBtn.textContent = '⏸';
      playBtn.classList.add('running');
      startTick();
    }
  }

  function skipBack() { setMode(mode); }

  function skipForward() {
    clearInterval(interval);
    remaining = 0;
    if (mode === 'work') {
      sessions++;
      focusMins += Math.round((totalSecs - remaining) / 60);
      focusC.textContent = sessions;
      focusM.textContent = focusMins + 'm';
      buildDots();
      setMode(sessions % 4 === 0 ? 'long' : 'short', false);
    } else {
      setMode('work', false);
    }
  }

  function buildDots() {
    sessRow.innerHTML = '';
    for (let i = 0; i < 4; i++) {
      if (i === 3) {
        const div = document.createElement('div');
        div.className = 'divider';
        sessRow.appendChild(div);
      }
      const dot = document.createElement('div');
      dot.className = 'session-dot' + (i < sessions % 4 || (sessions % 4 === 0 && sessions > 0) ? ' done' : '');
      if (i === 3 && sessions > 0 && sessions % 4 === 0) dot.classList.add('long');
      sessRow.appendChild(dot);
    }
  }

  buildDots();
  updateDisplay();
</script>
</body>
</html>
